name: Contract Release

on:
  push:
    tags:
      - "contract-v*"

permissions:
  contents: read

concurrency:
  group: contract-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @worlddock/contract lint
      - run: pnpm --filter @worlddock/contract test
      - run: pnpm --filter @worlddock/contract build
      - name: Verify contract tag matches package version
        run: test "${GITHUB_REF_NAME#contract-v}" = "$(node -p "require('./packages/contract/package.json').version")"
      - run: pnpm publish --access public --no-git-checks
        working-directory: packages/contract
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
