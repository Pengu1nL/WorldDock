name: CLI Release

on:
  push:
    tags:
      - "cli-v*"

permissions:
  contents: read

concurrency:
  group: cli-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @worlddock/contract test:pack
      - run: pnpm --filter @worlddock/cli lint
      - run: pnpm --filter @worlddock/cli test
      - run: pnpm --filter @worlddock/cli test:pack
      - name: Verify CLI tag matches package version
        run: test "${GITHUB_REF_NAME#cli-v}" = "$(node -p "require('./packages/worlddock-cli/package.json').version")"
      - run: pnpm --filter @worlddock/cli publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
