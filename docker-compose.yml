services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: worlddock
      POSTGRES_USER: worlddock
      POSTGRES_PASSWORD: worlddock
    ports:
      - "5432:5432"
    volumes:
      - worlddock_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worlddock -d worlddock"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - worlddock_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  meilisearch:
    image: getmeili/meilisearch:v1.13
    environment:
      MEILI_MASTER_KEY: worlddock_meili_master_key
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - worlddock_meilisearch:/meili_data

  storage:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: worlddock
      MINIO_ROOT_PASSWORD: worlddock-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - worlddock_storage:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  worlddock_postgres:
  worlddock_redis:
  worlddock_meilisearch:
  worlddock_storage:
